<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas — Event Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>

    /* ── Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    /* ── Design tokens ─────────────────────────────────────────────── */
    :root {
      /* Sidebar */
      --sb-bg:          #3B0082;
      --sb-hover:       rgba(255,255,255,0.07);
      --sb-active:      rgba(255,255,255,0.14);
      --sb-border:      rgba(255,255,255,0.09);
      --sb-label:       #C4B5FD;
      --sb-text:        rgba(255,255,255,0.65);
      --sb-text-active: #FFFFFF;

      /* Main */
      --main-bg:        #F0EFFF;
      --surface:        #FFFFFF;
      --border:         #E5E7EB;
      --border-focus:   #7C3AED;

      /* Brand */
      --accent:         #7C3AED;
      --accent-dark:    #6D28D9;
      --accent-light:   #EDE9FE;
      --accent-faint:   rgba(124,58,237,0.08);

      /* Status */
      --success:        #059669;
      --success-bg:     #D1FAE5;
      --success-border: rgba(5,150,105,0.2);
      --error:          #DC2626;
      --error-bg:       #FEE2E2;
      --error-border:   rgba(220,38,38,0.2);
      --warning:        #D97706;

      /* Text */
      --text:           #1E1B4B;
      --text-muted:     #6B7280;
      --text-light:     #9CA3AF;

      /* Shadows */
      --shadow-card: 0 1px 4px rgba(0,0,0,0.06), 0 6px 20px rgba(124,58,237,0.07);
      --shadow-toast: 0 4px 24px rgba(0,0,0,0.18);
    }

    /* ── Base typography ───────────────────────────────────────────── */
    body {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--main-bg);
      display: flex;
    }

    /* ══════════════════════════════════════════════════════════════ */
    /*  FORM (Add Event)                                              */
    /* ══════════════════════════════════════════════════════════════ */

    .form-card {{
      background: var(--surface);
      border-radius: 14px;
      padding: 30px 32px;
      box-shadow: var(--shadow-card);
      max-width: 700px;
      margin: 0 auto;
    }}

    .form-grid {{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 24px;
    }}

    .fg {{ display: flex; flex-direction: column; gap: 5px; }}
    .fg.span2 {{ grid-column: 1 / -1; }}

    label {{
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      user-select: none;
    }}

    input, select {{
      width: 100%;
      padding: 9px 11px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-family: inherit;
      font-size: 13.5px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.14s ease, box-shadow 0.14s ease;
      -webkit-appearance: none;
      appearance: none;
    }}

    input:focus, select:focus {{
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-faint);
    }}

    input::placeholder {{ color: #D1D5DB; }}

    input[type="date"]::-webkit-calendar-picker-indicator {{
      opacity: 0.45;
      cursor: pointer;
    }}

    /* Custom select arrow */
    .sel-wrap {{ position: relative; }}
    .sel-wrap::after {{
      content: '';
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid var(--text-muted);
      pointer-events: none;
    }}

    /* Phone — strip non-digits via JS, show numbers only */
    #f-phone {{ letter-spacing: 0.04em; }}

    /* Inline alert (error / info) */
    .form-alert {{
      display: none;
      align-items: flex-start;
      gap: 9px;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.45;
    }}

    .form-alert.is-error {{
      display: flex;
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid var(--error-border);
    }}

    .form-alert svg {{ flex-shrink: 0; margin-top: 1px; }}

    /* Submit button */
    .submit-btn {{
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14.5px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.01em;
      transition: background 0.14s ease, transform 0.1s ease;
    }}

    .submit-btn:hover:not(:disabled)  {{ background: var(--accent-dark); }}
    .submit-btn:active:not(:disabled) {{ transform: scale(0.993); }}
    .submit-btn:disabled              {{ opacity: 0.58; cursor: not-allowed; }}

    /* ══════════════════════════════════════════════════════════════ */
    /*  SIDEBAR                                                       */
    /* ══════════════════════════════════════════════════════════════ */
    .sidebar {
      width: 268px;
      flex-shrink: 0;
      height: 100vh;
      background: var(--sb-bg);
      display: flex;
      flex-direction: column;
    }

    /* Logo */
    .sb-logo {
      padding: 22px 20px 18px;
      border-bottom: 1px solid var(--sb-border);
      flex-shrink: 0;
    }

    .sb-logo img {
      height: 50px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    .logo-fallback {
      color: white;
      display: none;
    }

    .logo-fallback .lf-name {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: 0.1em;
    }

    .logo-fallback .lf-tag {
      font-size: 8.5px;
      font-weight: 500;
      letter-spacing: 0.2em;
      opacity: 0.45;
      margin-top: 3px;
    }

    /* Nav */
    .sb-nav {
      padding: 20px 10px;
      flex: 1;
    }

    .sb-nav-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--sb-label);
      padding: 0 10px;
      margin-bottom: 6px;
      display: block;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: var(--sb-text);
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 8px;
      text-align: left;
      transition: background 0.14s ease, color 0.14s ease;
      margin-bottom: 2px;
    }

    .nav-btn:hover  { background: var(--sb-hover);  color: rgba(255,255,255,0.9); }
    .nav-btn.active { background: var(--sb-active); color: var(--sb-text-active); }

    .nav-btn svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      opacity: 0.7;
      transition: opacity 0.14s ease;
    }

    .nav-btn.active svg,
    .nav-btn:hover  svg { opacity: 1; }

    /* Footer */
    .sb-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--sb-border);
      font-size: 10.5px;
      color: rgba(255,255,255,0.28);
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════════════════════════════ */
    /*  MAIN AREA                                                     */
    /* ══════════════════════════════════════════════════════════════ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      min-width: 0;
    }

    /* Topbar */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 58px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .topbar-title { font-size: 16px; font-weight: 600; line-height: 1.2; }
    .topbar-sub   { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; }

    /* Scrollable content area */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }

    /* Views */
    .view         { display: none; }
    .view.active  { display: block; }

    /* ── Spinner ───────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      display: inline-block;
      border-radius: 50%;
      animation: spin 0.55s linear infinite;
    }

    .spinner-sm {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
    }

    .spinner-md {
      width: 26px; height: 26px;
      border: 3px solid rgba(124,58,237,0.15);
      border-top-color: var(--accent);
    }

    /* State boxes (empty / loading) */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 32px;
      text-align: center;
      gap: 10px;
    }

    .state-box svg  { opacity: 0.22; color: var(--accent); width: 44px; height: 44px; }
    .state-box h3   { font-size: 15px; font-weight: 600; color: var(--text); }
    .state-box p    { font-size: 12.5px; color: var(--text-muted); max-width: 280px; line-height: 1.5; }

    /* ══════════════════════════════════════════════════════════════ */
    /*  SCHEDULED EVENTS                                              */
    /* ══════════════════════════════════════════════════════════════ */

    .ev-header {{
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 12px;
      flex-wrap: wrap;
    }}

    /* Filter pills */
    .pills {{ display: flex; gap: 6px; flex-wrap: wrap; }}

    .pill {{
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-family: inherit;
      transition: all 0.13s ease;
    }}

    .pill.active          {{ background: var(--accent); border-color: var(--accent); color: white; }}
    .pill:hover:not(.active) {{ border-color: var(--accent); color: var(--accent); }}

    /* Refresh button */
    .refresh-btn {{
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 7px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.13s ease;
    }}

    .refresh-btn:hover {{ border-color: var(--accent); color: var(--accent); }}
    .refresh-btn svg   {{ width: 13px; height: 13px; }}

    /* Table card */
    .table-card {{
      background: var(--surface);
      border-radius: 14px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }}

    /* Table */
    table {{
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }}

    thead th {{
      padding: 11px 14px;
      text-align: left;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: #FAFAFA;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }}

    tbody tr {{
      border-bottom: 1px solid var(--border);
      transition: background 0.1s ease;
    }}

    tbody tr:last-child {{ border-bottom: none; }}
    tbody tr:hover      {{ background: #FAFBFF; }}

    tbody td {{
      padding: 11px 14px;
      vertical-align: middle;
    }}

    /* Row number */
    .td-num {{ color: var(--text-light); font-size: 11.5px; width: 36px; }}

    /* Building badge */
    .badge {{
      display: inline-flex;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      background: var(--accent-light);
      color: var(--accent);
      white-space: nowrap;
    }}

    /* Event name */
    .td-name {{ font-weight: 500; }}

    /* ── Toast ─────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 22px; right: 22px;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13.5px;
      font-weight: 500;
      color: white;
      display: flex;
      align-items: center;
      gap: 9px;
      box-shadow: var(--shadow-toast);
      transform: translateY(72px);
      opacity: 0;
      transition: transform 0.32s cubic-bezier(0.34,1.4,0.64,1),
                  opacity 0.32s ease;
      z-index: 9000;
      max-width: 340px;
      pointer-events: none;
    }

    .toast.show            { transform: translateY(0); opacity: 1; pointer-events: auto; }
    .toast.t-success       { background: var(--success); }
    .toast.t-error         { background: var(--error); }
    .toast svg             { flex-shrink: 0; width: 15px; height: 15px; }

  </style>
</head>

        <line x1="8" y1="6"  x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <circle cx="3.5" cy="6"  r="0.5" fill="currentColor" stroke="none"/>
        <circle cx="3.5" cy="12" r="0.5" fill="currentColor" stroke="none"/>
        <circle cx="3.5" cy="18" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
      Scheduled Events
    </button>
  </nav>

  <div class="sb-footer">Canvas 1317 &middot; Canvas 1331 &middot; v1.0</div>

</aside>

<!-- ═══ MAIN ══════════════════════════════════════════════════════════ -->
<div class="main">

  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">Add Event</div>
      <div class="topbar-sub"   id="topbar-sub">Book a room in Canvas 1317 or Canvas 1331</div>
    </div>
  </div>

  <div class="content" id="main-content">

    <!-- ── ADD EVENT ─────────────────────────────────────────────── -->
    <div id="view-add" class="view active">
      <div class="form-card">
        <div class="form-grid">

          <!-- Inline alert -->
          <div class="fg span2">
            <div class="form-alert" id="form-alert">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8"  x2="12"    y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              <span id="alert-msg"></span>
            </div>
          </div>

          <!-- 1. Building -->
          <div class="fg">
            <label for="f-building">Building</label>
            <div class="sel-wrap">
              <select id="f-building" onchange="onContextChange()">
                <option value="">— Select Building —</option>
                <option value="Canvas 1317">Canvas 1317</option>
                <option value="Canvas 1331">Canvas 1331</option>
              </select>
            </div>
          </div>

          <!-- 2. Date -->
          <div class="fg">
            <label for="f-date">Date</label>
            <input type="date" id="f-date" onchange="onContextChange()">
          </div>

          <!-- 3. Start Time -->
          <div class="fg">
            <label for="f-start">Start Time</label>
            <div class="sel-wrap">
              <select id="f-start" onchange="syncEndTime()">
                <option value="">— Select Start Time —</option>
              </select>
            </div>
          </div>

          <!-- 4. End Time -->
          <div class="fg">
            <label for="f-end">End Time</label>
            <div class="sel-wrap">
              <select id="f-end">
                <option value="">— Select End Time —</option>
              </select>
            </div>
          </div>

          <!-- 5. Attendees -->
          <div class="fg">
            <label for="f-attendees">No. of Attendees</label>
            <input type="number" id="f-attendees" min="1" placeholder="e.g. 12">
          </div>

          <!-- 6. Event Name -->
          <div class="fg">
            <label for="f-name">Event Name</label>
            <input type="text" id="f-name" placeholder="e.g. Product Review">
          </div>

          <!-- 7. Contact Person -->
          <div class="fg">
            <label for="f-contact">Contact Person</label>
            <input type="text" id="f-contact" placeholder="Full name">
          </div>

          <!-- 8. Contact Number -->
          <div class="fg">
            <label for="f-phone">Contact Number</label>
            <input type="tel" id="f-phone" placeholder="10-digit number"
                   maxlength="10"
                   oninput="this.value=this.value.replace(/[^0-9]/g,'')">
          </div>

          <!-- Submit -->
          <div class="fg span2">
            <button class="submit-btn" id="submit-btn" onclick="submitForm()">
              Book Event
            </button>
          </div>

        </div><!-- /form-grid -->
      </div><!-- /form-card -->
    </div><!-- /view-add -->

    <!-- ── SCHEDULED EVENTS ──────────────────────────────────────── -->
    <div id="view-scheduled" class="view">

      <div class="ev-header">
        <div class="pills">
          <button class="pill active" onclick="setFilter('all',this)">All Buildings</button>
          <button class="pill" onclick="setFilter('Canvas 1317',this)">Canvas 1317</button>
          <button class="pill" onclick="setFilter('Canvas 1331',this)">Canvas 1331</button>
        </div>
        <button class="refresh-btn" onclick="loadEvents()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
          Refresh
        </button>
      </div>

      <div class="table-card">
        <div id="table-body">
          <!-- Populated by JS -->
          <div class="state-box">
            <span class="spinner spinner-md"></span>
            <p style="margin-top:12px">Loading events&hellip;</p>
          </div>
        </div>
      </div>

    </div><!-- /view-scheduled -->

  </div>

</div>

<!-- Toast notification -->
<div class="toast" id="toast">
  <svg id="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
       stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></svg>
  <span id="toast-msg"></span>
</div>

<script>
  'use strict';

  /* ──────────────────────────────────────────────────────────────────
     CONFIG — replace with your deployed Apps Script Web App URL
  ────────────────────────────────────────────────────────────────── */
  const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

  /* ──────────────────────────────────────────────────────────────────
     TIME SLOTS
  ────────────────────────────────────────────────────────────────── */
  const START_SLOTS = [
    '12:00 AM','1:00 AM','2:00 AM','3:00 AM','4:00 AM','5:00 AM',
    '6:00 AM','7:00 AM','8:00 AM','9:00 AM','10:00 AM','11:00 AM',
    '12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM',
    '6:00 PM','7:00 PM','8:00 PM','9:00 PM','10:00 PM','11:00 PM'
  ];
  // End time: same 24 slots + midnight cap
  const END_SLOTS = [...START_SLOTS, '12:00 AM (midnight)'];

  /** Convert a time-slot string to minutes since midnight. */
  function toMins(t) {
    if (!t) return 0;
    if (t === '12:00 AM (midnight)') return 1440;
    const [tp, period] = t.split(' ');
    let h = parseInt(tp.split(':')[0], 10);
    if (period === 'PM' && h !== 12) h += 12;
    if (period === 'AM' && h === 12) h = 0;
    return h * 60;
  }

  /* ──────────────────────────────────────────────────────────────────
     STATE
  ────────────────────────────────────────────────────────────────── */
  let allEvents     = [];
  let currentFilter = 'all';
  let bookedRanges  = [];   // [{s, e}] for selected building + date

  /* ──────────────────────────────────────────────────────────────────
     INIT — runs once on page load
  ────────────────────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', () => {
    // Restrict date picker to today onwards
    document.getElementById('f-date').min = new Date().toISOString().split('T')[0];

    // Populate start-time dropdown
    const startSel = document.getElementById('f-start');
    START_SLOTS.forEach(t => startSel.add(new Option(t, t)));

    // Populate end-time dropdown
    const endSel = document.getElementById('f-end');
    END_SLOTS.forEach(t => endSel.add(new Option(t, t)));
  });

  /* ──────────────────────────────────────────────────────────────────
     VIEW SWITCHING
  ────────────────────────────────────────────────────────────────── */
  const VIEW_META = {
    add:       { title: 'Add Event',        sub: 'Book a room in Canvas 1317 or Canvas 1331' },
    scheduled: { title: 'Scheduled Events', sub: 'All upcoming bookings across both buildings' }
  };

  function switchView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    document.getElementById('nav-'  + name).classList.add('active');
    document.getElementById('topbar-title').textContent = VIEW_META[name].title;
    document.getElementById('topbar-sub').textContent   = VIEW_META[name].sub;
    if (name === 'scheduled') loadEvents();
  }

  /* ──────────────────────────────────────────────────────────────────
     END-TIME SYNC
     Disable every end-time option that is <= the selected start time.
  ────────────────────────────────────────────────────────────────── */
  function syncEndTime() {
    const startVal  = document.getElementById('f-start').value;
    const endSel    = document.getElementById('f-end');
    const startMins = startVal ? toMins(startVal) : -1;

    Array.from(endSel.options).forEach((opt, i) => {
      if (i === 0) return;                          // skip placeholder
      opt.disabled = toMins(opt.value) <= startMins;
    });

    // Clear end selection if it is now invalid
    if (endSel.value && toMins(endSel.value) <= startMins) {
      endSel.value = '';
    }
  }

  /* ──────────────────────────────────────────────────────────────────
     AVAILABILITY PREVIEW
     When building + date are both chosen, fetch existing bookings for
     that combination and mark already-booked start-time slots.
  ────────────────────────────────────────────────────────────────── */
  async function onContextChange() {
    const building = document.getElementById('f-building').value;
    const date     = document.getElementById('f-date').value;

    // Reset labels regardless
    bookedRanges = [];
    resetStartLabels();

    if (!building || !date || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;

    try {
      const res  = await fetch(
        APPS_SCRIPT_URL +
        '?building=' + encodeURIComponent(building) +
        '&date='     + encodeURIComponent(date)
      );
      const data = await res.json();
      bookedRanges = (data.events || []).map(ev => ({
        s: toMins(ev.startTime),
        e: toMins(ev.endTime)
      }));
      markStartSlots();
    } catch (_) {
      // Preview is best-effort; silently skip if network is unavailable
    }
  }

  /** Restore original labels (remove "— booked" suffix). */
  function resetStartLabels() {
    const startSel = document.getElementById('f-start');
    START_SLOTS.forEach((t, i) => {
      const opt = startSel.options[i + 1];   // +1 for placeholder
      if (opt) opt.text = t;
    });
  }

  /** Append "— booked" to start-time options that overlap existing bookings. */
  function markStartSlots() {
    const startSel = document.getElementById('f-start');
    START_SLOTS.forEach((t, i) => {
      const opt = startSel.options[i + 1];
      if (!opt) return;
      const slotS    = toMins(t);
      const slotE    = slotS + 60;   // assume at least 1-hour slot
      const conflict = bookedRanges.some(r => slotS < r.e && slotE > r.s);
      opt.text = conflict ? t + ' — booked' : t;
    });
  }

  /* ──────────────────────────────────────────────────────────────────
     ALERT HELPERS
  ────────────────────────────────────────────────────────────────── */
  function showAlert(msg) {
    const el  = document.getElementById('form-alert');
    const txt = document.getElementById('alert-msg');
    el.classList.add('is-error');
    txt.textContent = msg;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function hideAlert() {
    document.getElementById('form-alert').classList.remove('is-error');
  }

  /* ──────────────────────────────────────────────────────────────────
     TOAST HELPER
  ────────────────────────────────────────────────────────────────── */
  function showToast(type, msg) {
    const toast = document.getElementById('toast');
    const icon  = document.getElementById('toast-icon');
    icon.innerHTML = type === 'success'
      ? '<polyline points="20 6 9 17 4 12"/>'
      : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
    document.getElementById('toast-msg').textContent = msg;
    toast.className = 'toast t-' + type + ' show';
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 4200);
  }
</script>
<script>
  'use strict';

  /* ──────────────────────────────────────────────────────────────────
     FORM SUBMIT
  ────────────────────────────────────────────────────────────────── */
  async function submitForm() {
    hideAlert();

    // Collect values
    const building      = document.getElementById('f-building').value;
    const date          = document.getElementById('f-date').value;
    const startTime     = document.getElementById('f-start').value;
    const endTime       = document.getElementById('f-end').value;
    const attendees     = document.getElementById('f-attendees').value;
    const eventName     = document.getElementById('f-name').value.trim();
    const contactPerson = document.getElementById('f-contact').value.trim();
    const contactNumber = document.getElementById('f-phone').value.trim();

    // ── Validation ─────────────────────────────────────────────────
    if (!building || !date || !startTime || !endTime ||
        !attendees || !eventName || !contactPerson || !contactNumber) {
      return showAlert('All fields are required — please complete every field before submitting.');
    }
    if (!/^\d{10}$/.test(contactNumber)) {
      return showAlert('Contact number must be exactly 10 digits (numbers only).');
    }
    if (parseInt(attendees, 10) < 1) {
      return showAlert('Number of attendees must be at least 1.');
    }
    if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      return showAlert('Setup needed: replace YOUR_APPS_SCRIPT_URL_HERE in this file with your Apps Script URL (see setup-guide.txt).');
    }

    // ── Submit ─────────────────────────────────────────────────────
    setBusy(true);

    const payload = {
      building, date, startTime, endTime,
      attendees: parseInt(attendees, 10),
      eventName, contactPerson, contactNumber
    };

    try {
      const res  = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body:   JSON.stringify(payload)
      });
      const data = await res.json();

      if (data.success) {
        showToast('success', '✓  ' + eventName + ' booked successfully!');
        resetForm();
        setTimeout(() => switchView('scheduled'), 1500);
      } else if (data.conflict) {
        showAlert(data.message ||
          'This time slot conflicts with an existing booking. Please choose a different time.');
      } else {
        showAlert(data.message || 'Something went wrong. Please try again.');
      }

    } catch (_) {
      showAlert('Network error — could not reach the booking server. Check your connection and try again.');
    } finally {
      setBusy(false);
    }
  }

  /** Toggle submit button between normal and loading state. */
  function setBusy(busy) {
    const btn = document.getElementById('submit-btn');
    btn.disabled = busy;
    btn.innerHTML = busy
      ? '<span class="spinner spinner-sm"></span>&ensp;Booking&hellip;'
      : 'Book Event';
  }

  /** Reset all form fields to their initial state. */
  function resetForm() {
    ['f-building','f-date','f-start','f-end','f-attendees','f-name','f-contact','f-phone']
      .forEach(id => { document.getElementById(id).value = ''; });
    bookedRanges = [];
    resetStartLabels();
    hideAlert();
  }

  /* ──────────────────────────────────────────────────────────────────
     LOAD & RENDER EVENTS
  ────────────────────────────────────────────────────────────────── */
  async function loadEvents() {
    setTableBody(loadingHTML());

    if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      setTableBody(emptyHTML('Setup Required',
        'Paste your Apps Script URL into the HTML file to load live events.'));
      return;
    }

    try {
      const res  = await fetch(APPS_SCRIPT_URL);
      const data = await res.json();
      allEvents  = data.events || [];
      renderTable();
    } catch (_) {
      setTableBody(emptyHTML('Could not load events',
        'Network error — check your connection and click Refresh.'));
    }
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function renderTable() {
    // Filter
    const rows = currentFilter === 'all'
      ? [...allEvents]
      : allEvents.filter(e => e.building === currentFilter);

    // Sort: newest date first, then latest start time first within same date
    rows.sort((a, b) => {
      const dateDiff = b.date.localeCompare(a.date);
      return dateDiff !== 0 ? dateDiff : toMins(b.startTime) - toMins(a.startTime);
    });

    if (rows.length === 0) {
      setTableBody(emptyHTML('No events booked yet',
        'Switch to Add Event to schedule the first booking.'));
      return;
    }

    const trs = rows.map((e, i) => `
      <tr>
        <td class="td-num">${i + 1}</td>
        <td><span class="badge">${esc(e.building)}</span></td>
        <td>${fmtDate(e.date)}</td>
        <td>${esc(e.startTime)}</td>
        <td>${esc(e.endTime)}</td>
        <td>${esc(String(e.attendees))}</td>
        <td class="td-name">${esc(e.eventName)}</td>
        <td>${esc(e.contactPerson)}</td>
        <td>${esc(e.contactNumber)}</td>
      </tr>`).join('');

    setTableBody(`
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Building</th>
            <th>Date</th>
            <th>Start</th>
            <th>End</th>
            <th>Attendees</th>
            <th>Event Name</th>
            <th>Contact Person</th>
            <th>Contact Number</th>
          </tr>
        </thead>
        <tbody>${trs}</tbody>
      </table>`);
  }

  /* ──────────────────────────────────────────────────────────────────
     TEMPLATE HELPERS
  ────────────────────────────────────────────────────────────────── */
  function setTableBody(html) {
    document.getElementById('table-body').innerHTML = html;
  }

  function loadingHTML() {
    return `<div class="state-box">
      <span class="spinner spinner-md"></span>
      <p style="margin-top:12px">Loading events&hellip;</p>
    </div>`;
  }

  function emptyHTML(title, sub) {
    return `<div class="state-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8"  y1="2" x2="8"  y2="6"/>
        <line x1="3"  y1="10" x2="21" y2="10"/>
      </svg>
      <h3>${title}</h3>
      <p>${sub}</p>
    </div>`;
  }

  /** Format ISO date string (yyyy-mm-dd) → "02 Apr 2026". */
  function fmtDate(d) {
    if (!d) return '—';
    const [y, m, day] = d.split('-').map(Number);
    const MON = ['Jan','Feb','Mar','Apr','May','Jun',
                 'Jul','Aug','Sep','Oct','Nov','Dec'];
    return String(day).padStart(2, '0') + ' ' + MON[m - 1] + ' ' + y;
  }

  /** Minimal HTML-escape to prevent XSS when rendering event data. */
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
